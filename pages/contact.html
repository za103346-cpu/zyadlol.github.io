<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <title>Contact | Your Courses</title>
</head>
<body>
    <header class="header" id="header">
        <a href="../index.html"><img src="../assets/images/Your-courses-logo.svg" alt="Your courses logo"></a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-courses.html">Add Course</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <section class="contact section">
            <div class="container">
                <div class="contact-header">
                    <h1>Get in touch.</h1>
                    <p>Our team of academic liaisons is here to assist your intellectual journey.</p>
                </div>

                <div class="contact-layout">
                    <div class="contact-form-container">
                        <form class="contact-form">
                            <div class="form-group">
                                <label>FULL NAME</label>
                                <input type="text" placeholder="Julian Voss-Andreae">
                            </div>
                            <div class="form-group">
                                <label>EMAIL ADDRESS</label>
                                <input type="email" placeholder="julian@institution.org">
                            </div>
                            <div class="form-group">
                                <label>MESSAGE</label>
                                <textarea placeholder="How can we help?"></textarea>
                            </div>
                            <button type="submit" class="primary-cta">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="logofooter">
            <img src="../assets/images/Your-Courses-footer.svg" alt="footer logo">
        </div>
        <h6>© 2026 Your Courses. Your all Tracker.</h6>
        <ul class="footer-links">
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Terms of Service</a></li>
            <li><a href="#">Help Center</a></li>
        </ul>
    </footer>
</body>
</html>
